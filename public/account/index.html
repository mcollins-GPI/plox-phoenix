<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Dropsonic Account</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <style>
            body {
                background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
                min-height: 100vh;
            }

            .shell {
                max-width: 960px;
            }

            .card {
                border: 0;
                box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.16);
            }

            .app-title {
                color: #fff;
            }

            .muted-invert {
                color: rgba(255, 255, 255, 0.75);
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="container py-5 shell">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                <div>
                    <h1 class="app-title mb-1">Dropsonic Account</h1>
                    <p class="muted-invert mb-0">Review your account and update your password.</p>
                </div>
                <div class="d-flex gap-2">
                    <a id="admin-link" class="btn btn-outline-light hidden" href="/admin/">Admin panel</a>
                    <a class="btn btn-outline-light" href="/library/">Open library</a>
                    <button id="logout-button" class="btn btn-outline-warning" type="button">Logout</button>
                </div>
            </div>

            <div id="alert-box" class="alert hidden" role="alert"></div>

            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                        <div>
                            <h2 class="h4 mb-1">Account</h2>
                            <div id="account-summary" class="text-muted"></div>
                        </div>
                        <span id="account-badge" class="badge bg-secondary"></span>
                    </div>
                    <form id="password-form" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="current-password">Current password</label>
                            <input id="current-password" class="form-control" type="password" autocomplete="current-password" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="new-password">New password</label>
                            <input id="new-password" class="form-control" type="password" autocomplete="new-password" required />
                        </div>
                        <div class="col-12">
                            <button class="btn btn-outline-primary" type="submit">Change password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/shared/auth-client.js"></script>
        <script src="index.js"></script>
    </body>
</html>
