<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Dropsonic</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/library.css" />
    </head>
    <body>
        <div id="library-topbar" class="container-fluid py-3 d-flex justify-content-between align-items-center gap-3 flex-wrap">
            <div>
                <strong class="library-title">Dropsonic Library</strong>
                <span id="library-user" class="text-muted ms-2"></span>
            </div>
            <div class="d-flex gap-2 library-topbar-actions">
                <a class="btn btn-sm btn-outline-secondary" href="../account/">Account</a>
                <button id="library-logout" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
        <div id="media-picker">
            <div id="artist-section" class="section-panel">
                <div id="collection-summary">
                    <div id="artist-count"></div>
                    <div class="artist-search-wrap">
                        <input id="artist-search" type="text" placeholder="Search artists" aria-label="Search artists" />
                        <button id="artist-search-clear" class="hidden" type="button" aria-label="Clear artist search">×</button>
                    </div>
                    <div class="artist-navigation"></div>
                    <div class="artist-navigation"></div>
                </div>
                <div id="artist-list"></div>
            </div>
            <div id="album-section" class="section-panel">
                <div id="artist-summary"></div>
                <div id="album-list"></div>
            </div>
            <div id="track-section" class="section-panel">
                <div class="title-container">
                    <div id="album-title" class="title-text"></div>
                    <button id="album-play" class="control hidden" type="button" aria-label="Play album">▶</button>
                    <button id="album-add" class="control hidden" type="button" aria-label="Add album to playlist">＋</button>
                </div>
                <div id="track-list"></div>
            </div>
        </div>
        <div id="media-player">
            <div id="control-container">
                <div id="audio-player-shell" aria-label="Audio player">
                    <button id="audio-play-toggle" class="audio-btn" type="button" aria-label="Play" title="Play">▶</button>
                    <input id="audio-seek" class="audio-seek" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek" />
                    <div id="audio-time" class="audio-time" aria-live="off">0:00 / 0:00</div>
                    <input id="audio-volume" class="audio-volume" type="range" min="0" max="1" value="1" step="0.01" aria-label="Volume" />
                </div>
                <audio id="audio-controller" autoplay></audio>
                <div id="now-playing" class="now-playing" aria-live="polite">
                    <div class="np-title" id="np-title">—</div>
                    <div class="np-sub" id="np-sub">—</div>
                </div>
                <div id="playlist-controls"></div>
            </div>
            <div id="playlist"></div>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"
        ></script>
        <script src="../data/runtime-config.js"></script>
        <script src="js/jsmediatags.js"></script>
        <script src="js/library.js"></script>
    </body>
</html>
