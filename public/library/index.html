<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Dropsonic</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/library.css" />
    </head>
    <body>
        <div id="library-topbar" class="container-fluid py-3 d-flex justify-content-between align-items-center gap-3">
            <div class="d-flex align-items-center gap-2 topbar-left">
                <img src="img/favicon.png" alt="Dropsonic" class="topbar-icon" width="24" height="24" />
                <strong class="library-title">Dropsonic Library</strong>
                <span id="library-user" class="text-muted ms-2"></span>
            </div>
            <div class="d-flex gap-2 library-topbar-actions">
                <div id="presence-pill" class="presence-pill hidden">
                    <button type="button" class="presence-pill-btn" aria-label="Other listeners" aria-haspopup="true" aria-expanded="false">
                        <span class="presence-pill-icon" aria-hidden="true">&#9835;</span>
                        <span id="presence-pill-count" class="presence-pill-count">0</span>
                    </button>
                    <div class="presence-pill-popover" role="menu">
                        <div class="presence-pill-header">Listening now</div>
                        <ul id="presence-pill-list" class="presence-pill-list"></ul>
                    </div>
                </div>
                <button
                    id="debug-toggle"
                    class="btn btn-sm btn-outline-secondary"
                    type="button"
                    title="Debug panel"
                    aria-label="Open debug panel"
                    style="opacity: 0.45; font-size: 0.7rem; padding-inline: 0.5rem"
                >
                    DBG
                </button>
                <a class="btn btn-sm btn-outline-secondary" href="../account/"><span class="btn-label">Account</span><span class="btn-icon" aria-hidden="true">&#9881;</span></a>
                <button id="library-logout" class="btn btn-sm btn-outline-danger" type="button"><span class="btn-label">Logout</span><span class="btn-icon" aria-hidden="true">&#10140;</span></button>
            </div>
        </div>
        <div id="media-picker">
            <div id="artist-section" class="section-panel">
                <div id="collection-summary">
                    <div id="artist-count"></div>
                    <div class="artist-search-wrap">
                        <input id="artist-search" type="text" placeholder="Search artists" aria-label="Search artists" />
                        <button id="artist-search-clear" class="hidden" type="button" aria-label="Clear artist search">×</button>
                    </div>
                    <div class="artist-navigation"></div>
                    <div class="artist-navigation"></div>
                </div>
                <div id="artist-list"></div>
            </div>
            <div id="album-section" class="section-panel">
                <div id="artist-summary"></div>
                <div id="album-list"></div>
            </div>
            <div id="track-section" class="section-panel">
                <div class="title-container">
                    <div id="album-title" class="title-text"></div>
                </div>
                <div id="track-list"></div>
            </div>
            <div id="media-player" class="section-panel">
                <div id="control-container">
                    <button id="mini-play-toggle" class="audio-btn mini-transport" type="button" aria-label="Play" title="Play">
                        <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.5 3.5v17l13-8.5z" /></svg>
                    </button>
                    <div id="audio-player-shell" aria-label="Audio player">
                        <button id="audio-play-toggle" class="audio-btn" type="button" aria-label="Play" title="Play">
                            <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.5 3.5v17l13-8.5z" /></svg>
                        </button>
                        <input id="audio-seek" class="audio-seek" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek" />
                        <div id="audio-time" class="audio-time" aria-live="off">0:00 / 0:00</div>
                        <input id="audio-volume" class="audio-volume" type="range" min="0" max="1" value="1" step="0.01" aria-label="Volume" />
                    </div>
                    <audio id="audio-controller" autoplay></audio>
                    <audio id="audio-preload" preload="auto"></audio>
                    <div id="now-playing" class="now-playing" aria-live="polite">
                        <div class="np-title" id="np-title">—</div>
                        <div class="np-sub" id="np-sub">—</div>
                    </div>
                    <div id="playlist-controls"></div>
                </div>
                <div id="playlist"></div>
            </div>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"
        ></script>
        <script src="../data/runtime-config.js"></script>
        <script src="js/jsmediatags.js"></script>
        <script src="js/library.js"></script>

        <!-- Debug panel overlay — toggled by the DBG button in the topbar -->
        <div
            id="debug-panel"
            role="dialog"
            aria-label="Debug panel"
            aria-modal="true"
            style="
                display: none;
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: rgba(10, 10, 15, 0.96);
                color: #c8ffc8;
                font-family: ui-monospace, monospace;
                font-size: 11px;
                flex-direction: column;
            "
        >
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #2a2a3a; flex-shrink: 0; background: rgba(0, 0, 0, 0.4)">
                <strong style="color: #fff; font-size: 13px">Dropsonic Debug</strong>
                <div style="display: flex; gap: 8px">
                    <button id="debug-clear-btn" type="button" style="background: #2a2a3a; border: none; color: #aaa; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px">
                        Clear
                    </button>
                    <button id="debug-close-btn" type="button" style="background: none; border: none; color: #f66; font-size: 18px; line-height: 1; cursor: pointer" aria-label="Close debug panel">
                        ✕
                    </button>
                </div>
            </div>
            <div id="debug-status" style="padding: 8px 12px; border-bottom: 1px solid #2a2a3a; flex-shrink: 0; color: #7dd3fc; white-space: pre; line-height: 1.6"></div>
            <div id="debug-log" style="flex: 1; overflow-y: auto; padding: 8px 12px; line-height: 1.6"></div>
        </div>
    </body>
</html>
