<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Dropsonic Login</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <style>
            body {
                background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
                min-height: 100vh;
            }

            .shell {
                max-width: 1100px;
            }

            .card {
                border: 0;
                box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.16);
            }

            .app-title {
                color: #fff;
            }

            .muted-invert {
                color: rgba(255, 255, 255, 0.75);
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="container py-5 shell">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                <div>
                    <h1 class="app-title mb-1">Dropsonic</h1>
                    <p class="muted-invert mb-0">Sign in to access your library.</p>
                </div>
                <div class="d-flex gap-2">
                    <a id="account-link" class="btn btn-outline-light hidden" href="/account/">Account</a>
                    <a id="admin-link" class="btn btn-outline-light hidden" href="/admin/">Admin panel</a>
                    <a id="library-link" class="btn btn-outline-light hidden" href="/library/">Open library</a>
                    <button id="logout-button" class="btn btn-outline-warning hidden" type="button">Logout</button>
                </div>
            </div>

            <div id="alert-box" class="alert hidden" role="alert"></div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div id="bootstrap-card" class="card hidden">
                        <div class="card-body p-4">
                            <h2 class="h4 mb-3">Initialize admin account</h2>
                            <p class="text-muted">Create the first administrator account for this instance.</p>
                            <form id="bootstrap-form" class="d-grid gap-3">
                                <div>
                                    <label class="form-label" for="bootstrap-user">Username</label>
                                    <input id="bootstrap-user" class="form-control" autocomplete="username" required />
                                </div>
                                <div>
                                    <label class="form-label" for="bootstrap-password">Password</label>
                                    <input id="bootstrap-password" class="form-control" type="password" autocomplete="new-password" required />
                                </div>
                                <button class="btn btn-primary" type="submit">Create admin</button>
                            </form>
                        </div>
                    </div>

                    <div id="login-card" class="card hidden">
                        <div class="card-body p-4">
                            <h2 class="h4 mb-3">Sign in</h2>
                            <form id="login-form" class="d-grid gap-3">
                                <div>
                                    <label class="form-label" for="login-user">Username</label>
                                    <input id="login-user" class="form-control" autocomplete="username" required />
                                </div>
                                <div>
                                    <label class="form-label" for="login-password">Password</label>
                                    <input id="login-password" class="form-control" type="password" autocomplete="current-password" required />
                                </div>
                                <button class="btn btn-dark" type="submit">Login</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7 d-grid gap-4"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/shared/auth-client.js"></script>
        <script src="index.js"></script>
    </body>
</html>
