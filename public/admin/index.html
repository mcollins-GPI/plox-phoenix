<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Dropsonic Admin</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <style>
            body {
                background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
                min-height: 100vh;
            }

            .shell {
                max-width: 1100px;
            }

            .card {
                border: 0;
                box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.16);
            }

            .app-title {
                color: #fff;
            }

            .muted-invert {
                color: rgba(255, 255, 255, 0.75);
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="container py-5 shell">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                <div>
                    <h1 class="app-title mb-1">Dropsonic Admin</h1>
                    <p class="muted-invert mb-0">Manage users, access, and password resets.</p>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-light" href="/account/">Account</a>
                    <a class="btn btn-outline-light" href="/library/">Open library</a>
                    <button id="logout-button" class="btn btn-outline-warning" type="button">Logout</button>
                </div>
            </div>

            <div id="alert-box" class="alert hidden" role="alert"></div>

            <div class="card mb-4">
                <div class="card-body p-4">
                    <h2 class="h4 mb-1">Administrator session</h2>
                    <div id="account-summary" class="text-muted"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-4 d-grid gap-4">
                    <div>
                        <h2 class="h4 mb-1">User administration</h2>
                        <p class="text-muted mb-0">Create users, reset passwords, and manage access.</p>
                    </div>

                    <form id="create-user-form" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label" for="create-user">Username</label>
                            <input id="create-user" class="form-control" required />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="create-password">Temporary password</label>
                            <input id="create-password" class="form-control" type="password" required />
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-check">
                                <input id="create-admin" class="form-check-input" type="checkbox" />
                                <label class="form-check-label" for="create-admin">Admin</label>
                            </div>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-success w-100" type="submit">Create</button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Role</th>
                                    <th>Enabled</th>
                                    <th>Reset password</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/shared/auth-client.js"></script>
        <script src="index.js"></script>
    </body>
</html>
